{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container pt-3">
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }}" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
